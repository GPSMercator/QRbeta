<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OGA</title>
  <style>
    /* =====================
       リセット & 変数
       ===================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg:   #000;
      --color-text: #fff;
      --color-sub:  rgba(255, 255, 255, 0.65);

      --font-main: "Noto Sans JP", sans-serif;

      --anim-text: 1s ease forwards;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-main);
    }


    /* =====================
       HERO
       ===================== */
    .hero {
      position: relative;
      height: 100vh;   /* fallback */
      height: 100svh;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url("top.jpg") center / cover no-repeat;

      opacity: 0;
      animation: fadeBg 1s ease forwards;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.10) 0%,
        rgba(0,0,0,0.20) 50%,
        rgba(0,0,0,0.50) 100%
      );
    }

    .text {
      position: absolute;
      bottom: 13%;
      left: 7%;
      right: 7%;
    }

    .name {
      margin-bottom: 18px;
      font-size: clamp(22px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: 0.18em;

      opacity: 0;
      animation: fadeText var(--anim-text);
      animation-delay: 1.0s;
    }

    .main {
      font-size: clamp(18px, 4.5vw, 32px);
      font-weight: 700;
      line-height: 1.7;
      letter-spacing: 0.05em;

      opacity: 0;
      animation: fadeText var(--anim-text);
      animation-delay: 1.5s;
    }

    .sub {
      margin-top: 10px;
      font-size: clamp(12px, 2.5vw, 16px);
      font-weight: 400;
      color: var(--color-sub);
      letter-spacing: 0.1em;

      opacity: 0;
      animation: fadeText var(--anim-text);
      animation-delay: 2.1s;
    }


    /* =====================
       ハンバーガーボタン
       ===================== */
    .menu-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 44px;
      height: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;

      opacity: 0;
      animation: fadeText 1s ease forwards;
      animation-delay: 1.4s;
    }

    .menu-btn span {
      display: block;
      width: 22px;
      height: 1px;
      background: rgba(255,255,255,0.75);
      transition: transform 0.35s ease, opacity 0.35s ease;
      transform-origin: center;
    }

    .menu-btn.is-open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .menu-btn.is-open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .menu-btn.is-open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }


    /* =====================
       フルスクリーンメニュー
       ===================== */
    .menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 10%;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .menu-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-overlay nav {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .menu-overlay nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: clamp(28px, 8vw, 52px);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;

      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease, color 0.2s;
    }

    .menu-overlay.is-open nav a {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-overlay nav a:nth-child(1) { transition-delay: 0.05s; }
    .menu-overlay nav a:nth-child(2) { transition-delay: 0.10s; }
    .menu-overlay nav a:nth-child(3) { transition-delay: 0.15s; }

    .menu-overlay nav a:hover {
      color: #fff;
    }


    /* =====================
       セクション共通
       ===================== */
    .section {
      min-height: 60vh;
      padding: 80px 7% 60px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .section-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 48px;
      opacity: 0.85;
    }


    /* =====================
       アニメーション
       ===================== */
    @keyframes fadeBg {
      to { opacity: 1; }
    }

    @keyframes fadeText {
      to { opacity: 1; }
    }


    /* =====================
       スマホ調整
       ===================== */
    @media (max-width: 480px) {
      .text {
        bottom: 16%;
        left: 6%;
        right: 6%;
      }
    }
  </style>
</head>

<body>

  <!-- ========== HERO ========== -->
  <section class="hero">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="text">
      <p class="name">OGA</p>
      <h1 class="main">漏れたものだけが、線になる</h1>
      <p class="sub">書字は、攻撃とトキメキ</p>
    </div>
  </section>

  <!-- ========== ハンバーガーボタン ========== -->
  <button class="menu-btn" aria-label="メニューを開く" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- ========== メニューオーバーレイ ========== -->
  <div class="menu-overlay" aria-hidden="true">
    <nav>
      <a href="#works">作品</a>
      <a href="#thought">思想</a>
      <a href="#profile">プロフィール</a>
    </nav>
  </div>

  <!-- ========== WORKS ========== -->
  <section id="works" class="section">
    <h2 class="section-title">作品</h2>
    <!-- ここに動画・写真などを追加 -->
  </section>

  <!-- ========== THOUGHT ========== -->
  <section id="thought" class="section">
    <h2 class="section-title">思想</h2>
    <!-- ここにテキスト・詩などを追加 -->
  </section>

  <!-- ========== PROFILE ========== -->
  <section id="profile" class="section">
    <h2 class="section-title">プロフィール</h2>
    <!-- ここにプロフィールを追加 -->
  </section>

  <script>
    const btn     = document.querySelector('.menu-btn');
    const overlay = document.querySelector('.menu-overlay');

    function openMenu() {
      btn.classList.add('is-open');
      overlay.classList.add('is-open');
      btn.setAttribute('aria-expanded', 'true');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeMenu() {
      btn.classList.remove('is-open');
      overlay.classList.remove('is-open');
      btn.setAttribute('aria-expanded', 'false');
      overlay.setAttribute('aria-hidden', 'true');
    }

    btn.addEventListener('click', () => {
      btn.classList.contains('is-open') ? closeMenu() : openMenu();
    });

    overlay.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', closeMenu);
    });

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeMenu();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeMenu();
    });
  </script>

</body>
</html>
