<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OGA</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
    }

    .bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
    }

    .text {
      position: absolute;
      bottom: 10%;
      left: 5%;
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="bg">
    <video id="bgVideo" autoplay muted loop playsinline preload="auto">
      <source src="oga-bg-loop-01.mp4" type="video/mp4">
    </video>
  </div>

  <div class="overlay"></div>

  <div class="text">
    <h1>漏れたものだけが、線になる</h1>
  </div>
</section>

<button class="menu-btn">menu</button>

<div class="menu-overlay"></div>

<script>
  // =====================
  // 動画ループ安定化
  // =====================
  const bgVideo = document.getElementById('bgVideo');

  if (bgVideo) {
    // iOS対策（強制再生）
    bgVideo.play().catch(() => {});

    // endedイベントで確実ループ
    bgVideo.addEventListener('ended', () => {
      bgVideo.currentTime = 0;
      bgVideo.play();
    });
  }

  // =====================
  // メニュー（エラー修正済み）
  // =====================
  const btn = document.querySelector('.menu-btn');
  const overlay = document.querySelector('.menu-overlay');

  function openMenu() {
    btn.classList.add('is-open');
    overlay.classList.add('is-open');
  }

  function closeMenu() {
    btn.classList.remove('is-open');
    overlay.classList.remove('is-open');
  }

  btn.addEventListener('click', () => {
    btn.classList.contains('is-open') ? closeMenu() : openMenu();
  });
</script>

</body>
</html>
